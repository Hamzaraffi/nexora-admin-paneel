<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1a2f57 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, #2e1a57 0%, transparent 40%),
                  #070a11;
      color: #eaf0ff;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 44px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }

    .brand-wrap {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4d93ff, #a585ff);
      display: grid;
      place-items: center;
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 auto 14px;
      box-shadow: 0 12px 30px rgba(77,147,255,0.35);
    }

    .brand-wrap h1 { font-size: 1.35rem; font-weight: 700; }
    .brand-wrap p { color: #9ba9c9; font-size: 0.88rem; margin-top: 4px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 0.83rem;
      font-weight: 600;
      color: #9ba9c9;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #eaf0ff;
      border-radius: 12px;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 200ms, box-shadow 200ms;
    }

    .form-group input:focus {
      border-color: #76b9ff;
      box-shadow: 0 0 0 3px rgba(118,185,255,0.15);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(120deg, #4d93ff, #a585ff);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 10px 28px rgba(77,147,255,0.3);
      transition: transform 180ms, filter 180ms;
    }

    .btn-login:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-error {
      margin-top: 14px;
      padding: 11px 14px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      color: #f87171;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .login-error.show { display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 22px;
      color: #9ba9c9;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .back-link:hover { color: #76b9ff; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="login-card">
    <div class="brand-wrap">
      <div class="brand-logo">N</div>
      <h1>Nexora Admin</h1>
      <p>Enter your password to access the dashboard</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
    </form>

    <a href="../index.html" class="back-link">← Back to Nexora site</a>
  </div>

  <script>
    const API = "http://localhost:5000/api";

    // Already logged in?
    if (localStorage.getItem("nexora_admin_token")) {
      window.location.href = "dashboard.html";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("login-error");

      btn.textContent = "Signing in...";
      btn.disabled = true;
      errEl.classList.remove("show");

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();

        if (!res.ok || !data.token) {
          errEl.textContent = data.message || "Invalid password";
          throw new Error(data.message || "Invalid password");
        }

        localStorage.setItem("nexora_admin_token", data.token);
        window.location.href = "dashboard.html";
      } catch (err) {
        console.error("Login error:", err);
        if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
          errEl.textContent = "Cannot connect to server. Make sure backend is running on port 5000.";
        }
        errEl.classList.add("show");
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
